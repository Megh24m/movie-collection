{% load static %}

<!DOCTYPE html>
<html>

<head>

    <title>Login</title>

    <link
        rel="stylesheet"
        href="{% static 'css/login.css' %}"
    >

</head>

<body>

    <div class="login-box">

        <h1>Login</h1>

        <form method="POST">

            {% csrf_token %}

            <input
                type="text"
                name="username"
                placeholder="Username"
                required
            >

            <input
                type="password"
                name="password"
                placeholder="Password"
                required
            >

            <button type="submit">
                Login
            </button>

        </form>

        <p>
            Don't have account?
            <a href="{% url 'register' %}">
                Register
            </a>
        </p>

    </div>

</body>
</html>
